<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ア ジェネレーター</title>
<style>
/* WebFont for maximum compatibility */
@font-face {
    font-family: "Hangyaku";
    src: url("Hangyaku.woff2") format("woff2"),
         url("Hangyaku.woff") format("woff");
    font-weight: normal;
    font-style: normal;
}

body {
    margin:0;
    font-family:sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:10px;
    background:#f0f0f0;
}

/* Outer wrapper allows responsive scaling */
#canvas-wrapper {
    width:100%;
    max-width:680px;
    transform-origin: top left;
}

/* Fixed design canvas */
#canvas {
    width:680px;
    height:680px;
    background-color:#e1ccad;
    position:relative;
    border:1px solid #ccc;
    margin-bottom:20px;
}

/* Character text with fixed design parameters */
#text {
    position:absolute;
    font-family:"Hangyaku";
    color:#9d3132;
    font-size:750px;
    left:343px;
    top:342px;
    transform: translate(-50%, -50%) scale(1.45,1);
    white-space:nowrap;
    user-select:none;
    pointer-events:none;
}

.controls {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
}

input {
    font-size:20px;
    width:200px;
    text-align:center;
}

button {
    font-size:18px;
    padding:6px 12px;
}
</style>
</head>
<body>

<div id="canvas-wrapper">
    <div id="canvas">
        <div id="text">ア</div>
    </div>
</div>

<div class="controls">
<label>Enter Single Character</label>
<input id="charInput" type="text" maxlength="1" value="ア">

<label>Download Filename (optional)</label>
<input id="filenameInput" type="text" placeholder="Default uses the character itself">

<button id="downloadBtn">Download JPG</button>
</div>

<script>
const charInput = document.getElementById("charInput");
const text = document.getElementById("text");
const downloadBtn = document.getElementById("downloadBtn");
const filenameInput = document.getElementById("filenameInput");
const canvasWrapper = document.getElementById("canvas-wrapper");

// Fixed design parameters
const DESIGN_WIDTH = 680;
const DESIGN_HEIGHT = 680;
const DESIGN_X = 343;
const DESIGN_Y = 342;
const FONT_SIZE = 750;
const SCALE_X = 1.45;
const SCALE_Y = 1;

// Only allow one character
charInput.addEventListener("input", ()=>{
    if(charInput.value.length > 1){
        charInput.value = charInput.value.charAt(0);
    }
    text.textContent = charInput.value;
});

// Scale wrapper for small screens, keep canvas & text fixed
function resizeCanvasWrapper() {
    const maxWidth = window.innerWidth - 20; // account for padding
    const scale = Math.min(maxWidth / DESIGN_WIDTH, 1);
    canvasWrapper.style.transform = `scale(${scale})`;
}
window.addEventListener("resize", resizeCanvasWrapper);
resizeCanvasWrapper();

// Download as 680x680 JPG
downloadBtn.addEventListener("click", ()=>{
    const canvasEl = document.createElement("canvas");
    canvasEl.width = DESIGN_WIDTH;
    canvasEl.height = DESIGN_HEIGHT;
    const ctx = canvasEl.getContext("2d");

    // Draw background
    ctx.fillStyle = "#e1ccad";
    ctx.fillRect(0,0,DESIGN_WIDTH,DESIGN_HEIGHT);

    // Draw text
    ctx.fillStyle = "#9d3132";
    ctx.font = `${FONT_SIZE}px Hangyaku`;
    ctx.save();
    ctx.translate(DESIGN_X, DESIGN_Y);
    ctx.scale(SCALE_X, SCALE_Y);
    ctx.textBaseline = "middle";
    ctx.textAlign = "center";
    ctx.fillText(charInput.value,0,0);
    ctx.restore();

    // Determine filename
    let filename = filenameInput.value.trim();
    if(!filename) filename = charInput.value || "character";

    const link = document.createElement("a");
    link.download = filename + ".jpg";
    link.href = canvasEl.toDataURL("image/jpeg",1.0);
    link.click();
});
</script>

</body>
</html>
