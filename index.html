<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ア ジェネレーター</title>
<style>
@font-face{
    font-family:"Hangyaku";
    src:url("Hangyaku.ttf");
}

body{
    margin:0;
    font-family:sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
    background:#f0f0f0;
}

#canvas{
    width:680px;
    height:680px;
    background-color:#e1ccad; /* canvas background color */
    position:relative;
    border:1px solid #ccc;
    margin-bottom:20px;
}

#text{
    position:absolute;
    font-family:"Hangyaku";
    color:#9d3132; /* text color */
    font-size:750px; /* fixed font size */
    transform: translate(-50%, -50%) scale(1.45,1); /* fixed scale */
    left:343px; /* fixed X position */
    top:342px;  /* fixed Y position */
    white-space:nowrap;
    user-select:none;
    pointer-events:none;
}

.controls{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
}

input{
    font-size:24px;
    width:200px;
    text-align:center;
}
button{
    font-size:20px;
    padding:6px 12px;
}
</style>
</head>
<body>

<div id="canvas">
<div id="text">ア</div>
</div>

<div class="controls">
<label>Enter Single Character</label>
<input id="charInput" type="text" maxlength="1" value="ア">

<label>Download Filename (optional)</label>
<input id="filenameInput" type="text" placeholder="Default uses the character itself">

<button id="downloadBtn">Download JPG</button>
</div>

<script>
const charInput = document.getElementById("charInput");
const text = document.getElementById("text");
const downloadBtn = document.getElementById("downloadBtn");
const filenameInput = document.getElementById("filenameInput");

// Only allow one character
charInput.addEventListener("input", ()=>{
    if(charInput.value.length > 1){
        charInput.value = charInput.value.charAt(0);
    }
    text.textContent = charInput.value;
});

downloadBtn.addEventListener("click", ()=>{
    const canvasEl = document.createElement("canvas");
    canvasEl.width = 680;
    canvasEl.height = 680;
    const ctx = canvasEl.getContext("2d");

    // Draw background
    ctx.fillStyle = "#e1ccad";
    ctx.fillRect(0,0,680,680);

    // Draw text
    ctx.fillStyle = "#9d3132";
    ctx.font = "750px Hangyaku";

    ctx.save();
    ctx.translate(343, 342); // fixed X/Y
    ctx.scale(1.45,1);       // fixed scale
    ctx.textBaseline = "middle";
    ctx.textAlign = "center";
    ctx.fillText(charInput.value, 0, 0);
    ctx.restore();

    // Determine filename
    let filename = filenameInput.value.trim();
    if(!filename) filename = charInput.value || "character";

    // Download as JPG
    const link = document.createElement("a");
    link.download = filename + ".jpg";
    link.href = canvasEl.toDataURL("image/jpeg", 1.0);
    link.click();
});
</script>

</body>
</html>
